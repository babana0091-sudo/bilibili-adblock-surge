name: validate-module

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate module script-path isolation
        env:
          # For PRs, validate the head branch name (source branch)
          VALIDATE_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: python3 scripts/validate_module.py
